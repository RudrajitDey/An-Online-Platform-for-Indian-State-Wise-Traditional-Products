{% extends "footer_base.html" %}

{% block title %}Seller Registration Form{% endblock title %}

{% block content %}
<style>
/* Page background */
body {
  font-family: 'Segoe UI', sans-serif;
}

<style>
/* Heading */
.seller-title {
    display: flex;
    justify-content: center;
   
}

/* Form container */
.sellerreg-form {
  max-width: 500px;
  margin: 50px auto;
  padding: 30px;
  background: #ffffff;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
}

/* Inputs */
.sellerreg-input {
  width: 100%;
  padding: 12px 15px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  transition: 0.3s;
}

/* Focus effect */
.sellerreg-input:focus {
  border-color: #2d6cdf;
  outline: none;
  box-shadow: 0 0 5px rgba(45, 108, 223, 0.2);
}

/* File inputs */
.sellerreg-file-input {
  padding: 8px;
  background: #f8f9fc;
  cursor: pointer;
}

/* File labels */
.sellerreg-file-label {
  display: block;
  margin-bottom: 6px;
  font-size: 14px;
  font-weight: 600;
  color: #444;
}

/* Button */
.sellerreg-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #2d6cdf, #4a8cff);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

/* Button hover */
.sellerreg-btn:hover {
  background: linear-gradient(135deg, #1f4bb8, #3a6fdc);
}

/* Placeholder color */
.sellerreg-input::placeholder {
  color: #999;
}

/* Messages */
.sellerreg-messages {
  max-width: 500px;
  margin: 20px auto 0;
  padding: 0;
  list-style: none;
}

.sellerreg-message-item {
  padding: 12px 15px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 14px;
}

.sellerreg-error {
  background: #fde8e8;
  color: #b42318;
}

.sellerreg-success {
  background: #e8f5e9;
  color: #2e7d32;
}

/* Responsive */
@media (max-width: 600px) {
  .sellerreg-form {
    margin: 20px;
    padding: 20px;
  }
}
</style>
<div class="seller-title"><h2>Seller Registration Form</h2>
</div>

{% if messages %}
<ul class="sellerreg-messages">
  {% for message in messages %}
  <li class="sellerreg-message-item sellerreg-{{ message.tags }}">
    {{ message }}
  </li>
  {% endfor %}
</ul>
{% endif %}


<!-- templates/become_seller.html -->
<form method="POST" enctype="multipart/form-data" class="sellerreg-form">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required class="sellerreg-input">

    <input type="email" name="email" placeholder="Email" required class="sellerreg-input">

    <input type="password" name="password" placeholder="Password" required class="sellerreg-input">

    <input type="text" name="shop_name" placeholder="Shop Name" required class="sellerreg-input">

    <input type="text" name="owner_name" placeholder="Owner Name" class="sellerreg-input">

    <input type="text" name="phone" placeholder="Phone" class="sellerreg-input">

    <input type="text" name="gst" placeholder="GST Number" class="sellerreg-input">

    <input type="text" name="license" placeholder="Drug License" class="sellerreg-input">

    <input type="text" name="city" placeholder="City" class="sellerreg-input">

    <label class="sellerreg-file-label">Choose GST File</label>
    <input type="file" name="gst_file" class="sellerreg-input sellerreg-file-input">

    <label class="sellerreg-file-label">Choose License File</label>
    <input type="file" name="license_file" class="sellerreg-input sellerreg-file-input">

    <label class="sellerreg-file-label">Upload ID Proof</label>
    <input type="file" name="id_proof" class="sellerreg-input sellerreg-file-input">

    <button type="submit" class="sellerreg-btn">Submit</button>
</form>
{% endblock content %}
